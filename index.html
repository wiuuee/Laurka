<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hope and Rose</title>
    <style>
        body {
            background-color: #f5f5dc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        #button {
            width: 200px;
            height: 100px;
            background-color: #ffb6c1;
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 24px;
            border-radius: 10px;
            color: #fff;
            transition: opacity 0.5s ease-out;
        }
        #rose {
            font-size: 0px;
            transition: font-size 2s ease-in-out;
            display: none;
        }
        #click {
             border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="click">Kliknij</div>
    <div id="button">Hope</div>
    <div id="rose">🌹</div>

    <script>
        document.getElementById('button').addEventListener('click', function() {
            this.style.opacity = '0';
            setTimeout(() => {
                this.style.display = 'none';
                var rose = document.getElementById('rose');
                rose.style.display = 'block';
                // Trigger reflow
                rose.offsetHeight;
                rose.style.fontSize = '200px';
            }, 500);
        });
    </script>
</body>
</html>
